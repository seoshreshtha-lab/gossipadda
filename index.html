<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gossip Adda</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
color:white;
min-height:100vh;
}

.section{display:none;padding:40px 20px;max-width:900px;margin:auto;}
.active{display:block;}

.hero{
text-align:center;
margin-top:80px;
}

.hero h1{
font-size:52px;
font-weight:700;
}

.hero p{
margin-top:15px;
opacity:0.8;
}

button{
padding:12px 20px;
border:none;
border-radius:12px;
cursor:pointer;
font-weight:600;
margin-top:20px;
background:linear-gradient(135deg,#ff2d95,#ff6a00);
color:white;
}

.category-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
margin-top:40px;
}

.card{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(20px);
padding:20px;
border-radius:20px;
cursor:pointer;
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
}

textarea{
width:100%;
height:90px;
padding:12px;
border-radius:12px;
border:none;
margin-top:15px;
resize:none;
}

.post{
background:rgba(255,255,255,0.07);
padding:15px;
border-radius:15px;
margin-top:15px;
}

.small-btn{
background:none;
border:1px solid rgba(255,255,255,0.3);
padding:6px 10px;
margin-left:10px;
font-size:12px;
}

.top-nav{
position:fixed;
top:20px;
right:20px;
}

.report-box{
margin-top:30px;
opacity:0.7;
font-size:13px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="top-nav">
<button onclick="showSection('home')">Home</button>
</div>

<!-- HOME -->
<div id="home" class="section active">
<div class="hero">
<h1>Gossip Adda</h1>
<h3>Spill it. No names. No judgement.</h3>
<p>A safe anonymous space to drop your tea, overthink loudly, and vent freely.</p>
<button onclick="showSection('categories')">Get Started</button>

<div class="report-box" onclick="alert('Feature coming soon: Raise a concern form')">
🚩 Raise a Concern / Report Chat
</div>
</div>
</div>

<!-- CATEGORIES -->
<div id="categories" class="section">
<h2>Select a Gossip Column</h2>

<div class="category-grid">
<div class="card" onclick="openRoom('Random Gossip')">🔥 Random Gossip</div>
<div class="card" onclick="openRoom('College Gossip')">🎓 College Gossip</div>
<div class="card" onclick="openRoom('Situationship')">💔 Situationship</div>
<div class="card" onclick="openRoom('Am I Overthinking?')">🧠 Am I Overthinking?</div>
</div>
</div>

<!-- ROOM -->
<div id="room" class="section">
<h2 id="roomTitle"></h2>

<textarea id="gossipInput" placeholder="Drop your tea anonymously..."></textarea>
<button onclick="postGossip()">Post</button>

<div id="gossipFeed"></div>
</div>

<script>
let currentRoom = "";
let data = JSON.parse(localStorage.getItem("gossipData")) || {};

function showSection(id){
document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

function openRoom(roomName){
currentRoom = roomName;
document.getElementById("roomTitle").innerText = roomName;
showSection('room');
renderPosts();
}

function postGossip(){
let text = document.getElementById("gossipInput").value.trim();
if(text==="") return;

if(!data[currentRoom]) data[currentRoom]=[];

data[currentRoom].unshift({
text:text,
replies:[],
time:new Date().toLocaleString()
});

localStorage.setItem("gossipData",JSON.stringify(data));
document.getElementById("gossipInput").value="";
renderPosts();
}

function replyPost(index){
let reply = prompt("Write anonymous reply:");
if(!reply) return;

data[currentRoom][index].replies.push(reply);
localStorage.setItem("gossipData",JSON.stringify(data));
renderPosts();
}

function renderPosts(){
let feed=document.getElementById("gossipFeed");
feed.innerHTML="";

if(!data[currentRoom]) return;

data[currentRoom].forEach((post,index)=>{
let html=`
<div class="post">
<p>${post.text}</p>
<small>${post.time}</small>
<br>
<button class="small-btn" onclick="replyPost(${index})">Reply</button>
<button class="small-btn" onclick="alert('Reported')">Report</button>
`;

post.replies.forEach(r=>{
html+=`<div style="margin-top:8px;font-size:13px;opacity:0.8;">↳ ${r}</div>`;
});

html+=`</div>`;
feed.innerHTML+=html;
});
}
</script>

</body>
</html>
